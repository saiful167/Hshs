<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Saiful Pro Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-md mx-auto space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-4">ফাইল আপলোড করুন</h2>
            <input type="file" id="fileInput" class="w-full p-2 border rounded mb-4">
            <button onclick="uploadFile()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">চেক শুরু করুন</button>
        </div>

        <div id="foundBox" class="hidden bg-green-50 border border-green-200 p-4 rounded-xl shadow-md">
            <h3 class="text-green-800 font-bold mb-2">✅ Found Users:</h3>
            <ul id="foundList" class="text-green-700 text-sm font-mono space-y-1"></ul>
        </div>

        <div id="status" class="text-center text-gray-600 italic"></div>
    </div>

    <script>
        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            
            reader.onload = async (e) => {
                const numbers = e.target.result.split('\n').filter(n => n.trim() !== "");
                document.getElementById('status').innerText = "প্রসেসিং হচ্ছে...";
                
                const res = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ numbers })
                });
                
                const data = await res.json();
                const foundBox = document.getElementById('foundBox');
                const foundList = document.getElementById('foundList');
                
                if (data.results.length > 0) {
                    foundBox.classList.remove('hidden');
                    foundList.innerHTML = "";
                    data.results.forEach(item => {
                        const li = document.createElement('li');
                        li.innerText = `● ${item.number}`;
                        foundList.appendChild(li);
                    });
                    document.getElementById('status').innerText = "চেক সম্পন্ন!";
                } else {
                    document.getElementById('status').innerText = "কোনো ইউজার পাওয়া যায়নি।";
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
